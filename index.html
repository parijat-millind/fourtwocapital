<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Component: Icon
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        // Scroll Reveal Hook
        const useScrollReveal = () => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) setIsVisible(true);
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return [ref, isVisible];
        };

        function App() {
            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth' });

                    <SolutionTimeline />

            ];

            return (
                <section className="py-24 px-6 bg-slate-50">
                    <div className="max-w-3xl mx-auto">
                        <h2 className="text-3xl md:text-4xl font-bold mb-12 text-center underline decoration-primary decoration-4 underline-offset-8">Frequently Asked Questions</h2>
                        <div className="space-y-4">
                            {faqs.map((f, i) => (
                                <div key={i} className="bg-white border border-slate-200 rounded-2xl overflow-hidden transition-all shadow-sm hover:shadow-md">
                                    <button
                                        onClick={() => setOpenIdx(openIdx === i ? -1 : i)}
                                        className="w-full p-6 flex justify-between items-center text-left"
                                    >
                                        <span className="font-bold text-slate-800 text-sm md:text-base">{f.q}</span>
                                        <Icon name={openIdx === i ? "minus" : "plus"} className={`w-5 h-5 transition-transform ${openIdx === i ? 'text-primary' : 'text-slate-400'}`} />
                                    </button>
                                    <div className={`transition-all duration-300 ${openIdx === i ? 'max-h-96 opacity-100 p-6 pt-0 border-t border-slate-50' : 'max-h-0 opacity-0 pointer-events-none'}`}>

                                    </div>
                                </div>
                            ))}

                    </div>

        const ContactForm = () => {
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);

                const formData = new FormData(e.target);
                const scriptURL = "https://script.google.com/macros/s/AKfycbxBJsFUuktxF7b5zdAcVbI4Wa5YrJVcfcOYoOy4ZHFcLY25iUSCAiV6jHrCP-HXYW7rEQ/exec";

                try {
                    await fetch(scriptURL, {
                        method: 'POST',
                        body: formData,
                        mode: 'no-cors',
                    });
                    setSubmitted(true);
                } catch (error) {
                    console.error("Submission error:", error);
                    alert("Something went wrong. Please try again or contact us directly.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <section id="contact" className="py-24 px-6">
                    <div className="max-w-4xl mx-auto bg-white p-6 md:p-12 rounded-[40px] shadow-2xl relative overflow-hidden border border-slate-100">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>

                            </div>
                        ) : (
                            <div className="flex flex-col lg:flex-row gap-12">
                                <div className="flex-1">
                                    <h2 className="text-3xl md:text-4xl font-bold mb-4">Begin Your Credit Restoration Today</h2>
                                    <p className="text-slate-500 mb-8 leading-relaxed text-sm md:text-base">
                                        Share your details below and our credit specialists will conduct a complimentary audit of your credit profile — identifying the inaccuracies standing between you and loan eligibility.

                                    <div className="space-y-4">
                                        <a href="tel:+916364055652" target="_blank" className="flex items-center gap-4 group">
                                            <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center group-hover:bg-primary transition-colors">
                                                <Icon name="phone" className="w-5 h-5" />
                                            </div>
                                            <span className="font-medium text-sm md:text-base group-hover:text-primary transition-colors">+91 6364055652</span>
                                        </a>
                                        <a href="https://wa.me/916364055652" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 group">
                                            <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center group-hover:bg-primary transition-colors">
                                                <Icon name="message-circle" className="w-5 h-5" />
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="font-medium text-sm md:text-base group-hover:text-primary transition-colors">Connect on WhatsApp</span>
                                                <span className="text-[10px] text-slate-400 font-bold uppercase tracking-wider">Response Within 10 Minutes</span>
                                            </div>
                                        </a>
                                        <a href="mailto:support@fortytwocapital.in" target="_blank" className="flex items-center gap-4 group">
                                            <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center group-hover:bg-primary transition-colors">
                                                <Icon name="mail" className="w-5 h-5" />
                                            </div>
                                            <span className="font-medium text-sm md:text-base group-hover:text-primary transition-colors">support@fortytwocapital.in</span>
                                        </a>
                                        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeU5ai1HFNaZdRksfWM_Akebw8pXVTErx3N-y0dVC3yLp9GaA/viewform?usp=header" target="_blank" rel="noopener noreferrer" className="flex items-center gap-4 group">
                                            <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center group-hover:bg-primary transition-colors">
                                                <Icon name="clipboard-list" className="w-5 h-5" />
                                            </div>
                                            <div className="flex flex-col">
                                                <span className="font-medium text-sm md:text-base group-hover:text-primary transition-colors">Complimentary Audit Request</span>

                                        </a>
                                    </div>
                                </div>
                                <form onSubmit={handleSubmit} className="flex-1 space-y-4">

                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Phone Number (+91)</label>
                                            <input name="phone" required type="tel" pattern="[6-9][0-9]{9}" className="w-full bg-slate-50 border-2 border-transparent focus:border-primary/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm" placeholder="9876543210" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Select Your Recovery Plan</label>
                                            <select name="package" className="w-full bg-slate-50 border-2 border-transparent focus:border-primary/50 focus:bg-white rounded-xl p-4 transition-all outline-none appearance-none text-sm">
                                                <option>Complimentary Audit Only</option>
                                                <option>Foundation Plan</option>
                                                <option>Resolution Plan</option>

                                    </div>
                                    <div className="space-y-1">

                                    </div>
                                    <button

                                    >
                                        {loading ? (
                                            <>
                                                <span className="w-4 h-4 border-2 border-slate-900/30 border-t-slate-900 rounded-full animate-spin"></span>

                                </form>
                            </div>
                        )}
                    </div>
                </section>
            );
        };

        const Footer = () => (

                <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                    <div className="text-center md:text-left">
                        <div className="flex items-center justify-center md:justify-start gap-2 mb-4">
                            <div className="w-6 h-6 bg-primary rounded flex items-center justify-center text-slate-900">
                                <Icon name="activity" className="w-4 h-4" />

                            <span className="font-bold tracking-tight">Forty Two <span className="text-primary italic">Capital</span></span>

                        <p className="text-xs text-slate-500 max-w-sm mx-auto md:mx-0 leading-relaxed italic">Empowering Indians to reclaim their financial standing through expert credit restoration and bureau dispute resolution.</p>
                        <p className="text-[9px] text-slate-400 max-w-sm mx-auto md:mx-0 leading-relaxed mt-4">
                            Forty Two Capital is a credit advisory and dispute facilitation service. We are not affiliated with CIBIL, Experian, Equifax, or CRIF. All dispute filings are conducted through official bureau and lender channels in full compliance with applicable RBI guidelines.
                        </p>
                    </div>
                    <div className="flex flex-wrap justify-center gap-6 text-[11px] text-slate-500 font-medium">
                        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeU5ai1HFNaZdRksfWM_Akebw8pXVTErx3N-y0dVC3yLp9GaA/viewform?usp=header" target="_blank" rel="noopener noreferrer" className="hover:text-primary transition-colors">Request an Audit</a>
                        <a href="#" className="hover:text-primary transition-colors">Privacy Policy</a>
                        <a href="#" className="hover:text-primary transition-colors">Terms of Service</a>
                        <a href="#" className="hover:text-primary transition-colors">RBI Guidelines</a>
                    </div>
                    <div className="text-[9px] text-slate-400 font-medium italic text-center md:text-right">
                        © 2026 Forty Two Capital. All Rights Reserved. | CIN: [Company Registration Number] | Not a Credit Rating Agency. Services rendered in accordance with the Credit Information Companies (Regulation) Act, 2005.
                    </div>
                </div>
            </footer>
        );

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

    </script>
</body>
