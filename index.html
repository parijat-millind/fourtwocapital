<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Component: Icon
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        // Scroll Reveal Hook
        const useScrollReveal = () => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) setIsVisible(true);
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return [ref, isVisible];
        };

        function App() {
            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth' });

            return (

                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Phone Number (+91)</label>
                                            <input name="phone" required type="tel" pattern="[6-9][0-9]{9}" className="w-full bg-slate-50 border-2 border-transparent focus:border-accent/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm" placeholder="9876543210" />

                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">SELECT YOUR RECOVERY PLAN</label>
                                            <select name="package" className="w-full bg-slate-50 border-2 border-transparent focus:border-accent/50 focus:bg-white rounded-xl p-4 transition-all outline-none appearance-none text-sm">

                                                <option>Foundation Plan</option>
                                                <option>Resolution Plan</option>
                                                <option>Elite Recovery Plan</option>

                                    <div className="space-y-1">

                                        <input name="email" required type="email" className="w-full bg-slate-50 border-2 border-transparent focus:border-accent/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm" placeholder="john@example.com" />
                                    </div>
                                    <button
                                        disabled={loading}
                                        className={`w-full py-4 bg-accent text-white font-bold rounded-xl shadow-md hover:opacity-90 transition-all mt-4 text-sm flex items-center justify-center gap-2 ${loading ? 'opacity-70 cursor-not-allowed' : ''}`}
                                    >
                                        {loading ? (
                                            <>
                                                <span className="w-4 h-4 border-2 border-slate-900/30 border-t-slate-900 rounded-full animate-spin"></span>
                                                Capturing Details...

                                    <div className="flex flex-col items-center gap-2 mt-4">
                                        <p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest flex items-center gap-1">
                                            <Icon name="lock" className="w-3 h-3" /> 100% Secure. No spam. Data encrypted.
                                        </p>
                                        <div className="flex gap-4 opacity-50 grayscale hover:grayscale-0 transition-all">
                                            <img src="https://img.icons8.com/color/48/ssl.png" alt="SSL" className="h-6" />
                                            <img src="https://img.icons8.com/ios-filled/50/244855/safe.png" alt="Privacy" className="h-5" />
                                            <img src="https://img.icons8.com/ios-filled/50/244855/rbi.png" alt="RBI" className="h-5" />

                                    </div>

                </section>
            );
        };

        const FeedbackForm = () => {
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);

                const formData = new FormData(e.target);
                const scriptURL = "https://script.google.com/macros/s/AKfycbxBJsFUuktxF7b5zdAcVbI4Wa5YrJVcfcOYoOy4ZHFcLY25iUSCAiV6jHrCP-HXYW7rEQ/exec";

                try {
                    await fetch(scriptURL, {
                        method: 'POST',
                        body: formData,
                        mode: 'no-cors',
                    });
                    setSubmitted(true);
                } catch (error) {
                    console.error("Submission error:", error);
                    alert("Something went wrong. Please try again.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <section id="feedback" className="py-24 px-6 bg-lightbg">
                    <div className="max-w-4xl mx-auto">
                        <div className="text-center mb-12">
                            <h2 className="text-3xl md:text-4xl font-bold mb-4">Your Experience Matters</h2>

                        </div>

                        <div className="bg-white p-8 md:p-12 rounded-3xl shadow-xl border border-slate-100">

                                <div className="text-center py-10 space-y-4 animate-in fade-in zoom-in duration-500">
                                    <div className="w-16 h-16 bg-accent/20 text-accent mx-auto rounded-full flex items-center justify-center">
                                        <Icon name="heart" className="w-8 h-8" />
                                    </div>
                                    <h3 className="text-2xl font-bold">Thank You for Your Feedback!</h3>
                                    <p className="text-slate-500 max-w-sm mx-auto">Your insights help us provide better credit advisory services to all our clients.</p>
                                    <button onClick={() => setSubmitted(false)} className="text-accent font-black tracking-tight underline">Submit another feedback</button>
                                </div>
                            ) : (
                                <form onSubmit={handleSubmit} className="space-y-6">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Email ID</label>
                                            <input name="email" required type="email" className="w-full bg-slate-50 border-2 border-transparent focus:border-accent/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm" placeholder="john@example.com" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Mobile Number (+91)</label>
                                            <input name="phone" required type="tel" pattern="[6-9][0-9]{9}" className="w-full bg-slate-50 border-2 border-transparent focus:border-accent/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm" placeholder="9876543210" />
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Your Feedback</label>
                                        <textarea name="feedback" required rows="4" className="w-full bg-slate-50 border-2 border-transparent focus:border-accent/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm resize-none" placeholder="How was your experience with us? Any suggestions for improvement?"></textarea>
                                    </div>
                                    <button
                                        disabled={loading}
                                        className={`w-full py-4 bg-primary text-[#FBE9D0] font-bold rounded-2xl shadow-xl hover:bg-slate-800 transition-all flex items-center justify-center gap-2 ${loading ? 'opacity-70 cursor-not-allowed' : ''}`}
                                    >
                                        {loading ? 'Submitting...' : 'Submit Feedback'}
                                    </button>
                                </form>
                            )}
                        </div>
                    </div>
                </section>
            );
        };

        const WhatsAppWidget = () => (
            <a
                href="https://wa.me/916364055652"
                target="_blank"
                rel="noopener noreferrer"
                className="fixed bottom-6 right-6 z-[100] bg-[#25D366] text-white p-4 rounded-full shadow-2xl hover:scale-110 active:scale-95 transition-all group flex items-center gap-3"
            >
                <span className="max-w-0 overflow-hidden group-hover:max-w-xs transition-all duration-500 font-bold text-sm whitespace-nowrap">
                    Chat with an Expert
                </span>
                <Icon name="message-circle" className="w-6 h-6" />
                <div className="absolute -top-1 -right-1 w-4 h-4 bg-red-500 rounded-full animate-pulse border-2 border-white"></div>
            </a>
        );

        const Footer = () => (
            <footer className="py-12 bg-primary text-[#FBE9D0] w-full">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8 px-6">
                    <div className="text-center md:text-left">
                        <div className="flex items-center justify-center md:justify-start gap-2 mb-4">
                            <div className="w-6 h-6 bg-accent rounded flex items-center justify-center text-primary">
                                <Icon name="activity" className="w-4 h-4" />
                            </div>
                            <span className="font-bold tracking-tight">Forty Two <span className="text-accent font-black tracking-tight">Capital</span></span>
                        </div>
                        <p className="text-xs text-slate-500 max-w-sm mx-auto md:mx-0 leading-relaxed italic">Empowering Indians to reclaim their financial standing through expert credit restoration and bureau dispute resolution.</p>
                        <p className="text-[9px] text-slate-400 max-w-sm mx-auto md:mx-0 leading-relaxed mt-4">
                            Forty Two Capital is a credit advisory and dispute facilitation service. We are not affiliated with CIBIL, Experian, Equifax, or CRIF. All dispute filings are conducted through official bureau and lender channels in full compliance with applicable RBI guidelines.
                        </p>
                        <div className="flex gap-4 mt-6 opacity-40 grayscale items-center justify-center md:justify-start">
                            <img src="https://img.icons8.com/color/48/ssl.png" alt="SSL" className="h-6" />
                            <img src="https://img.icons8.com/ios-filled/50/FBE9D0/safe.png" alt="Privacy" className="h-5" />
                            <img src="https://img.icons8.com/ios-filled/50/FBE9D0/rbi.png" alt="RBI" className="h-5" />
                            <div className="flex flex-col text-[8px] font-bold uppercase tracking-tighter text-[#FBE9D0]/50 border-l border-white/10 pl-4">
                                <span>256-Bit</span>
                                <span>Encryption</span>
                            </div>
                        </div>
                    </div>
                    <div className="flex flex-wrap justify-center gap-6 text-[11px] text-slate-500 font-medium">
                        <a href="https://docs.google.com/forms/d/e/1FAIpQLSeU5ai1HFNaZdRksfWM_Akebw8pXVTErx3N-y0dVC3yLp9GaA/viewform?usp=header" target="_blank" rel="noopener noreferrer" className="hover:text-accent transition-colors">Request an Audit</a>
                        <button onClick={() => {
                            const element = document.getElementById('feedback');
                            if (element) element.scrollIntoView({ behavior: 'smooth' });
                        }} className="hover:text-accent transition-colors">Share Feedback</button>
                        <a href="#" className="hover:text-accent transition-colors">Privacy Policy</a>
                        <a href="#" className="hover:text-accent transition-colors">Terms of Service</a>
                        <a href="#" className="hover:text-accent transition-colors">RBI Guidelines</a>
                    </div>
                    <div className="text-[9px] text-slate-500 font-medium italic text-center md:text-right">
                        © 2026 Forty Two Capital. All Rights Reserved. | CIN: [Company Registration Number] | Not a Credit Rating Agency. Services rendered in accordance with the Credit Information Companies (Regulation) Act, 2005.
                    </div>
                </div>
            </footer>
        );

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

    </script>
