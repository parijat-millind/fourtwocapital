<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forty Two Capital — India's Premier Credit Advisory</title>
    <!-- React & Babel CDNs -->
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Framer Motion (requires a special UMD build if using CDN) -->
    <!-- We'll use a standard framer-motion approach if possible, but standard UMD is tricky.
         I'll use a simpler AOS (Animate on Scroll) or just Tailwind transitions for "simple".
         Actually, I'll try to use a simple scroll-reveal observer. -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: {
                            DEFAULT: '#90EE90',
                            dark: '#76C776',
                        },
                    },
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <style>
        @layer base {
            body { @apply font-sans antialiased bg-white text-slate-900; }
        }
        
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { @apply bg-transparent; }
        ::-webkit-scrollbar-thumb { @apply bg-primary/30 rounded-full hover:bg-primary/50; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // Custom Component: Icon
        const Icon = ({ name, className = "w-6 h-6" }) => {
            useEffect(() => {
                lucide.createIcons();
            }, []);
            return <i data-lucide={name} className={className}></i>;
        };

        // Scroll Reveal Hook
        const useScrollReveal = () => {
            const [isVisible, setIsVisible] = useState(false);
            const ref = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) setIsVisible(true);
                }, { threshold: 0.1 });
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, []);

            return [ref, isVisible];
        };

        function App() {
            const scrollTo = (id) => {
                const element = document.getElementById(id);
                if (element) element.scrollIntoView({ behavior: 'smooth' });
            };

            return (
                <div className="min-h-screen">
                    <Navbar scrollTo={scrollTo} />
                    <Hero scrollTo={scrollTo} />
                    <ProblemOverview />
                    <SolutionTimeline />
                    <Packages scrollTo={scrollTo} />
                    <ContactForm />
                    <Footer />
                </div>
            );
        }

        const Navbar = ({ scrollTo }) => (
            <nav className="fixed w-full z-50 flex justify-center bg-white border-b border-slate-100 shadow-sm">
                <div className="max-w-7xl w-full px-6 py-4 flex justify-between items-center bg-white">
                    <div className="flex items-center gap-2">
                        <div className="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-slate-900">
                            <Icon name="activity" className="w-5 h-5" />
                        </div>
                        <span className="text-xl font-bold tracking-tight">Forty Two <span className="text-primary truncate">Capital</span></span>
                    </div>
                    
                    <div className="hidden md:flex items-center gap-8 text-sm font-medium">
                        <button onClick={() => scrollTo('about')} className="hover:text-primary transition-colors">About Us</button>
                        <button onClick={() => scrollTo('how-it-works')} className="hover:text-primary transition-colors">How It Works</button>
                        <button onClick={() => scrollTo('packages')} className="hover:text-primary transition-colors">Packages</button>
                        <button onClick={() => scrollTo('contact')} className="hover:text-primary transition-colors">Contact Us</button>
                    </div>

                    <div className="flex items-center gap-4">
                        <button 
                            onClick={() => scrollTo('contact')}
                            className="bg-primary hover:bg-primary-dark text-slate-900 font-bold px-5 py-2.5 rounded-xl transition-all shadow-md hover:shadow-primary/40 text-sm"
                        >
                            Free Audit
                        </button>
                    </div>
                </div>
            </nav>
        );

        const Hero = ({ scrollTo }) => {
            const [ref, isVisible] = useScrollReveal();
            return (
                <section className="relative pt-32 pb-20 px-6 overflow-hidden flex flex-col items-center text-center">
                    {/* Background glows */}
                    <div className="absolute top-0 -left-20 w-72 h-72 bg-primary/20 rounded-full blur-[120px] -z-10"></div>
                    <div className="absolute bottom-40 -right-20 w-96 h-96 bg-primary/10 rounded-full blur-[150px] -z-10"></div>
                    
                    <div ref={ref} className={`max-w-4xl transition-all duration-1000 transform ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                        <div className="inline-flex items-center gap-2 bg-primary/10 text-primary-dark px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider mb-8">
                            <span className="flex h-2 w-2 rounded-full bg-primary animate-pulse"></span>
                            India's Most Trusted Credit Advisory
                        </div>
                        
                        <h1 className="text-4xl md:text-7xl font-bold mb-6 leading-[1.1]">
                            We don't just check your CIBIL — <br/>
                            <span className="text-primary italic">We FIX it.</span>
                        </h1>
                        
                        <p className="text-base md:text-xl text-slate-600 mb-10 max-w-2xl mx-auto leading-relaxed px-2">
                            Helping Indians fix credit report errors, improve scores, and unlock life-changing loan approvals with expert dispute handling.
                        </p>
                        
                        <div className="flex flex-col sm:flex-row gap-4 justify-center items-center w-full max-w-md mx-auto sm:max-w-none">
                            <button 
                                onClick={() => scrollTo('contact')}
                                className="w-full sm:w-auto bg-primary text-slate-900 font-bold px-8 py-4 rounded-2xl shadow-xl shadow-primary/20 hover:shadow-primary/40 hover:-translate-y-1 transition-all flex items-center justify-center gap-2"
                            >
                                Get Free Audit Now <Icon name="chevron-right" className="w-5 h-5" />
                            </button>
                            <button 
                                onClick={() => scrollTo('how-it-works')}
                                className="w-full sm:w-auto px-8 py-4 rounded-2xl border-2 border-slate-200 hover:border-primary transition-all font-semibold"
                            >
                                See How It Works
                            </button>
                        </div>
                        
                        <div className="mt-16 grid grid-cols-2 lg:grid-cols-3 gap-8 md:gap-12 py-8 border-y border-slate-100">
                            <div>
                                <div className="text-2xl md:text-3xl font-bold text-primary mb-1">30%</div>
                                <div className="text-xs md:text-sm text-slate-500">Indians Face Loan Rejection</div>
                            </div>
                            <div>
                                <div className="text-2xl md:text-3xl font-bold text-primary mb-1">40Cr+</div>
                                <div className="text-xs md:text-sm text-slate-500">Have Zero Credit History</div>
                            </div>
                            <div className="col-span-2 lg:col-span-1">
                                <div className="text-2xl md:text-3xl font-bold text-primary mb-1">1 in 2</div>
                                <div className="text-xs md:text-sm text-slate-500">Never Checked Their Score</div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const ProblemOverview = () => {
            const [ref, isVisible] = useScrollReveal();
            return (
                <section id="about" className="py-24 px-6 bg-slate-50/50">
                    <div ref={ref} className={`max-w-7xl mx-auto transition-all duration-1000 transform ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}>
                        <div className="flex flex-col md:flex-row gap-16 items-center">
                            <div className="flex-1 space-y-6">
                                <h2 className="text-3xl md:text-4xl font-bold leading-tight">
                                    Why this is India's Most Needed <span className="text-primary truncate">Financial Service</span>
                                </h2>
                                <p className="text-slate-600 text-base md:text-lg">
                                    The Indian credit landscape is riddled with clerical errors, duplicate accounts, and outdated information. These "invisible monsters" are stopping millions from buying homes, starting businesses, or getting personal loans.
                                </p>
                                <ul className="space-y-4">
                                    {[
                                        "Incorrect outstanding balances",
                                        "Duplicate entries for the same loan",
                                        "Identity theft or unauthorized accounts",
                                        "Delay in reporting closure of loans"
                                    ].map((item, i) => (
                                        <li key={i} className="flex items-start gap-3">
                                            <div className="mt-1 bg-red-500/10 text-red-500 p-1 rounded-full">
                                                <Icon name="x-circle" className="w-4 h-4" />
                                            </div>
                                            <span className="text-slate-700 font-medium">{item}</span>
                                        </li>
                                    ))}
                                </ul>
                            </div>
                            <div className="flex-1 relative w-full max-w-md mx-auto md:max-w-none">
                                <div className="absolute -inset-4 bg-primary/20 blur-3xl rounded-full opacity-50"></div>
                                <div className="relative bg-white p-8 rounded-[32px] shadow-2xl border border-slate-100">
                                    <div className="space-y-6">
                                        <div className="flex justify-between items-center">
                                            <span className="font-bold">CIBIL HEALTH REPORT</span>
                                            <span className="text-xs bg-red-100 text-red-600 px-2 py-1 rounded font-bold uppercase">Critical</span>
                                        </div>
                                        <div className="flex items-center gap-4">
                                            <div className="w-16 h-16 rounded-full border-4 border-slate-200 border-t-red-500 flex items-center justify-center font-bold text-xl">
                                                540
                                            </div>
                                            <div>
                                                <div className="font-bold">Current Score</div>
                                                <div className="text-sm text-slate-500">3 Significant Errors Found</div>
                                            </div>
                                        </div>
                                        <div className="p-4 bg-primary/10 rounded-2xl border border-primary/20">
                                            <div className="text-xs font-bold uppercase text-primary-dark mb-1">Our Target</div>
                                            <div className="text-2xl font-bold">780+</div>
                                            <div className="text-xs text-slate-500 mt-1">Loan Ready & Low Interest Eligibility</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const SolutionTimeline = () => {
            const steps = [
                { title: "Onboarding", desc: "Share your credit reports from all 4 bureaus (CIBIL, Experian, Equifax, CRIF).", icon: "file-input" },
                { title: "Deep Audit", desc: "Our AI & experts scan for errors, wrong information, or duplicate entries.", icon: "search" },
                { title: "Dispute Letters", desc: "Professional drafting of dispute letters tailored for each identified error.", icon: "mail" },
                { title: "Submission", desc: "Guidance on filing via official portals or via registered post.", icon: "send" },
                { title: "Follow-Up", desc: "Enforcing the RBI-mandated 30-day response window with persistence.", icon: "clock" },
                { title: "Re-Audit", desc: "Verification of corrected data and proof of score improvement.", icon: "shield-check" },
            ];

            return (
                <section id="how-it-works" className="py-24 px-6 overflow-hidden">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-4xl font-bold mb-4">Our 6-Step Solution</h2>
                            <p className="text-slate-500 max-w-xl mx-auto">A data-driven approach to restoring your financial reputation.</p>
                        </div>
                        
                        <div className="relative">
                            {/* Desktop Line */}
                            <div className="hidden lg:block absolute top-1/2 left-0 w-full h-0.5 bg-slate-100 -translate-y-1/2 -z-10"></div>
                            
                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-6 gap-y-12 gap-x-8">
                                {steps.map((step, idx) => {
                                    const [ref, isVisible] = useScrollReveal();
                                    return (
                                        <div 
                                            key={idx} 
                                            ref={ref}
                                            className={`flex flex-col items-center text-center transition-all duration-700 transform ${isVisible ? 'translate-y-0 opacity-100' : 'translate-y-10 opacity-0'}`}
                                            style={{ transitionDelay: `${idx * 100}ms` }}
                                        >
                                            <div className="w-14 h-14 rounded-2xl bg-white shadow-xl flex items-center justify-center mb-6 relative border-2 border-primary/20">
                                                <div className="absolute -top-3 -left-3 w-6 h-6 bg-primary text-slate-900 rounded-full text-[10px] font-bold flex items-center justify-center">
                                                    {idx + 1}
                                                </div>
                                                <Icon name={step.icon} className="w-6 h-6 text-primary" />
                                            </div>
                                            <h3 className="font-bold mb-2 text-sm md:text-base">{step.title}</h3>
                                            <p className="text-[11px] md:text-xs text-slate-500 leading-relaxed px-4 sm:px-0">{step.desc}</p>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </section>
            );
        };

        const Packages = ({ scrollTo }) => {
            const tiers = [
                {
                    name: "Essential",
                    features: ["Single Bureau Audit", "Up to 3 Dispute Letters", "1 Follow-up Cycle", "Basic Credit Education"],
                    cta: "Get Essential"
                },
                {
                    name: "Advanced",
                    popular: true,
                    features: ["All 4 Bureaus Audit", "Unlimited Dispute Letters", "3-Month Follow-up", "Score Improvement Plan"],
                    cta: "Get Advanced"
                },
                {
                    name: "Comprehensive",
                    features: ["Everything in Advanced", "Monthly Monitoring", "Priority Support", "Loan Readiness Report"],
                    cta: "Get Comprehensive"
                }
            ];

            return (
                <section id="packages" className="py-24 px-6 bg-slate-50/50">
                    <div className="max-w-7xl mx-auto">
                        <div className="text-center mb-16">
                            <h2 className="text-3xl md:text-4xl font-bold mb-4">Choose Your Path to Recovery</h2>
                            <p className="text-slate-500">Flexible plans tailored to the severity of your credit errors.</p>
                        </div>
                        
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {tiers.map((tier, idx) => (
                                <div key={idx} className={`relative bg-white p-8 rounded-[32px] border-2 transition-all hover:-translate-y-2 ${tier.popular ? 'border-primary shadow-2xl shadow-primary/10' : 'border-slate-200 hover:border-primary/50'}`}>
                                    {tier.popular && (
                                        <div className="absolute -top-4 left-1/2 -translate-x-1/2 bg-primary text-slate-900 text-[10px] font-bold px-4 py-1.5 rounded-full uppercase">
                                            Most Popular
                                        </div>
                                    )}
                                    <h3 className="text-xl md:text-2xl font-bold mb-6">{tier.name}</h3>
                                    <div className="space-y-4 mb-10">
                                        {tier.features.map((feature, fidx) => (
                                            <div key={fidx} className="flex items-center gap-3 text-sm">
                                                <div className="text-primary">
                                                    <Icon name="check-circle-2" className="w-5 h-5" />
                                                </div>
                                                <span className="text-slate-700">{feature}</span>
                                            </div>
                                        ))}
                                    </div>
                                    <button 
                                        onClick={() => scrollTo('contact')}
                                        className={`w-full py-4 rounded-2xl font-bold transition-all ${tier.popular ? 'bg-primary text-slate-900 shadow-xl shadow-primary/20' : 'bg-slate-200 hover:bg-primary hover:text-slate-900'}`}
                                    >
                                        Enquire Now
                                    </button>
                                </div>
                            ))}
                        </div>
                    </div>
                </section>
            );
        };

        const ContactForm = () => {
            const [submitted, setSubmitted] = useState(false);
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setLoading(true);

                const formData = new FormData(e.target);
                const scriptURL = "https://script.google.com/macros/s/AKfycbxBJsFUuktxF7b5zdAcVbI4Wa5YrJVcfcOYoOy4ZHFcLY25iUSCAiV6jHrCP-HXYW7rEQ/exec";

                try {
                    await fetch(scriptURL, {
                        method: 'POST',
                        body: formData,
                        mode: 'no-cors', 
                    });
                    setSubmitted(true);
                } catch (error) {
                    console.error("Submission error:", error);
                    alert("Something went wrong. Please try again or contact us directly.");
                } finally {
                    setLoading(false);
                }
            };

            return (
                <section id="contact" className="py-24 px-6">
                    <div className="max-w-4xl mx-auto bg-white p-6 md:p-12 rounded-[40px] shadow-2xl relative overflow-hidden border border-slate-100">
                        <div className="absolute top-0 right-0 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
                        
                        {submitted ? (
                            <div className="text-center py-10 space-y-6 animate-in fade-in zoom-in duration-500">
                                <div className="w-20 h-20 bg-primary/20 text-primary mx-auto rounded-full flex items-center justify-center">
                                    <Icon name="check-check" className="w-10 h-10" />
                                </div>
                                <h3 className="text-2xl md:text-3xl font-bold">Inquiry Received!</h3>
                                <p className="text-slate-500 max-w-sm mx-auto text-sm md:text-base px-4">
                                    A senior credit advisor from <span className="font-bold">Forty Two Capital</span> will contact you shortly to start your audit.
                                </p>
                                <button onClick={() => setSubmitted(false)} className="text-primary font-bold underline">Send another inquiry</button>
                            </div>
                        ) : (
                            <div className="flex flex-col lg:flex-row gap-12">
                                <div className="flex-1">
                                    <h2 className="text-3xl md:text-4xl font-bold mb-4">Book Your Free Audit</h2>
                                    <p className="text-slate-500 mb-8 leading-relaxed text-sm md:text-base">
                                        Take the first step towards loan eligibility. Our experts will identify the errors hurting your score.
                                    </p>
                                    <div className="space-y-4">
                                        <div className="flex items-center gap-4 group">
                                            <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center group-hover:bg-primary transition-colors">
                                                <Icon name="phone" className="w-5 h-5" />
                                            </div>
                                            <span className="font-medium text-sm md:text-base">+91 91234 56789</span>
                                        </div>
                                        <div className="flex items-center gap-4 group">
                                            <div className="w-10 h-10 rounded-xl bg-slate-100 flex items-center justify-center group-hover:bg-primary transition-colors">
                                                <Icon name="mail" className="w-5 h-5" />
                                            </div>
                                            <span className="font-medium text-sm md:text-base">support@fortytwocapital.in</span>
                                        </div>
                                    </div>
                                </div>
                                <form onSubmit={handleSubmit} className="flex-1 space-y-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Full Name</label>
                                        <input name="name" required type="text" className="w-full bg-slate-50 border-2 border-transparent focus:border-primary/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm" placeholder="John Doe" />
                                    </div>
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Phone Number (+91)</label>
                                            <input name="phone" required type="tel" pattern="[6-9][0-9]{9}" className="w-full bg-slate-50 border-2 border-transparent focus:border-primary/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm" placeholder="9876543210" />
                                        </div>
                                        <div className="space-y-1">
                                            <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Package Interest</label>
                                            <select name="package" className="w-full bg-slate-50 border-2 border-transparent focus:border-primary/50 focus:bg-white rounded-xl p-4 transition-all outline-none appearance-none text-sm">
                                                <option>Free Audit Only</option>
                                                <option>Essential Package</option>
                                                <option>Advanced Package</option>
                                                <option>Comprehensive Package</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold uppercase tracking-wider text-slate-500 ml-1">Email Address</label>
                                        <input name="email" required type="email" className="w-full bg-slate-50 border-2 border-transparent focus:border-primary/50 focus:bg-white rounded-xl p-4 transition-all outline-none text-sm" placeholder="john@example.com" />
                                    </div>
                                    <button 
                                        disabled={loading}
                                        className={`w-full py-4 bg-primary text-slate-900 font-bold rounded-2xl shadow-xl shadow-primary/20 hover:shadow-primary/40 hover:-translate-y-1 transition-all mt-4 text-sm flex items-center justify-center gap-2 ${loading ? 'opacity-70 cursor-not-allowed' : ''}`}
                                    >
                                        {loading ? (
                                            <>
                                                <span className="w-4 h-4 border-2 border-slate-900/30 border-t-slate-900 rounded-full animate-spin"></span>
                                                Capturing Details...
                                            </>
                                        ) : 'Start My Free Audit'}
                                    </button>
                                </form>
                            </div>
                        )}
                    </div>
                </section>
            );
        };

        const Footer = () => (
            <footer className="py-12 border-t border-slate-100 mx-6">
                <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-8">
                    <div className="text-center md:text-left">
                        <div className="flex items-center justify-center md:justify-start gap-2 mb-4">
                            <div className="w-6 h-6 bg-primary rounded flex items-center justify-center text-slate-900 text-[10px] font-bold">42</div>
                            <span className="font-bold tracking-tight">Forty Two <span className="text-primary italic">Capital</span></span>
                        </div>
                        <p className="text-xs text-slate-500 max-w-xs mx-auto md:mx-0 leading-relaxed">Restoring credit health and unlocking financial freedom for everyday Indians.</p>
                    </div>
                    <div className="flex flex-wrap justify-center gap-6 text-[11px] text-slate-500 font-medium">
                        <a href="#" className="hover:text-primary transition-colors">Privacy Policy</a>
                        <a href="#" className="hover:text-primary transition-colors">Terms of Service</a>
                        <a href="#" className="hover:text-primary transition-colors">RBI Guidelines</a>
                    </div>
                    <div className="text-[10px] text-slate-400 font-medium italic">
                        © 2026 Forty Two Capital. All Rights Reserved.
                    </div>
                </div>
            </footer>
        );

        const container = document.getElementById('root');
        const root = ReactDOM.createRoot(container);
        root.render(<App />);

    </script>
</body>
</html>
